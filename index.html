<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This Week at First Baptist</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap"
    rel="stylesheet"
  />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: fixed;
      inset: 0;
      background-image: url('desktop-calendar.png');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 40%,
        rgba(0, 0, 0, 0.45) 100%
      );
    }

    .content {
      position: fixed;
      top: 500px;
      left: 110px;
      right: 60px;
      transform: translateY(-50%);
      z-index: 10;
      color: #ffffff;
    }

    .schedule {
      display: flex;
      flex-direction: column;
      gap: 24px;
      font-family: 'Inter', Arial Black, Helvetica Neue, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .schedule-row {
      display: flex;
      align-items: flex-start;
    }

    .day {
      font-size: 60px;
      font-weight: 900;
      line-height: 1.15;
      min-width: 480px;
      flex-shrink: 0;
    }

    .events {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .event {
      font-size: 68px;
      font-weight: 700;
      line-height: 1.15;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <div class="schedule">

      <div class="schedule-row">
        <div class="day">Today</div>
        <div class="events">
          <div class="event">9:15 Sunday School</div>
          <div class="event">10:15 Worship</div>
        </div>
      </div>

      <div class="schedule-row">
        <div class="day">Wednesday</div>
        <div class="events">
          <div class="event">10:30 Bible Study</div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
